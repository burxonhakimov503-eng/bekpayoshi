<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bek Pay Osh</title>

    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0B3D3B',
                        accent: '#FFA500',
                        darkBg: '#0F172A',
                        darkCard: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Yandex Maps API -->
    <script src="https://api-maps.yandex.ru/2.1/?lang=uz_UZ" type="text/javascript"></script>

    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #F9FAFB; user-select: none; font-family: 'Outfit', sans-serif; transition: background-color 0.3s ease; }
        .dark body { background-color: #0F172A; color: #F1F5F9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes toastIn { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .promo-container { width: 100%; overflow: hidden; position: relative; border-radius: 24px; height: 180px; background: #f3f4f6; }
        .dark .promo-container { background: #1E293B; }
        .promo-slider { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .promo-slide { min-width: 100%; height: 100%; position: relative; }
        .promo-slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .toast-box { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 9999; animation: toastIn 0.3s ease-out; }

        /* Custom Bottom Nav Active State */
        .nav-item { position: relative; z-index: 10; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-active-bg { 
            position: absolute; 
            top: -24px; 
            width: 64px; 
            height: 64px; 
            background: #000; 
            border-radius: 50%; 
            border: 6px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }
        .dark .nav-active-bg { background: #fff; border-color: #1E293B; }
        .nav-item.active { transform: translateY(-20px); color: #000; }
        .dark .nav-item.active { color: #fff; }
        .nav-item.active span:first-child { color: #fff; }
        .dark .nav-item.active span:first-child { color: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [products, setProducts] = useState([]);
            const [productsLoaded, setProductsLoaded] = useState(false);
            const [promoSlide, setPromoSlide] = useState(0);
            const [promoImages, setPromoImages] = useState([]);
            const [promoPaused, setPromoPaused] = useState(false);
            const promoTimerRef = useRef(null);
            const resumeTimerRef = useRef(null);
            const [news, setNews] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [cart, setCart] = useState({});
            const [userOrders, setUserOrders] = useState([]);
            const [activeTab, setActiveTab] = useState("Osh");
            const [currentPage, setCurrentPage] = useState('home');
            const [adminTab, setAdminTab] = useState('asosiy');
            const [showAddMenu, setShowAddMenu] = useState(false);
            const [logoClicks, setLogoClicks] = useState(0);
            const [toast, setToast] = useState(null);
            const [orderType, setOrderType] = useState('pickup');
            const [address, setAddress] = useState(localStorage.getItem('bekpay_address') || '');
            const [location, setLocation] = useState(JSON.parse(localStorage.getItem('bekpay_location')) || null);
            const [addressDetails, setAddressDetails] = useState(JSON.parse(localStorage.getItem('bekpay_address_details')) || {
                title: '',
                house: '',
                apartment: '',
                floor: '',
                entrance: '',
                comment: ''
            });
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [stats, setStats] = useState(null);
            const [lang, setLang] = useState(localStorage.getItem('bekpay_lang') || 'lat');
            const [profileDetail, setProfileDetail] = useState(null);
            const [showLocationModal, setShowLocationModal] = useState(false);
            const [showAddressDetailsForm, setShowAddressDetailsForm] = useState(false);
            const [showReconfirmModal, setShowReconfirmModal] = useState(false);
            const mapRef = useRef(null);
            const [mapMarker, setMapMarker] = useState(null);
            const [tempLocation, setTempLocation] = useState(null);
            const [isMapVisible, setIsMapVisible] = useState(false);
            const [outOfBounds, setOutOfBounds] = useState(false);
            const [reverseAddr, setReverseAddr] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const lineChartRef = useRef(null);
            const pieChartRef = useRef(null);
            const barChartRef = useRef(null);
            const lineChartInstance = useRef(null);
            const pieChartInstance = useRef(null);
            const barChartInstance = useRef(null);
            
            const tg = window.Telegram ? window.Telegram.WebApp : null;

            const GIJDUVAN_CENTER = [40.0995, 64.6775];
            const MAX_DELIVERY_RADIUS = 10; // km

            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            };

            const isWithinDeliveryArea = (lat, lon) => {
                return getDistance(lat, lon, GIJDUVAN_CENTER[0], GIJDUVAN_CENTER[1]) <= MAX_DELIVERY_RADIUS;
            };

            const t = {
                lat: {
                    menu: 'Bosh sahifa',
                    orders: 'Buyurtmalar',
                    cart: 'Savat',
                    profile: 'Profil',
                    contacts: 'Kontaktlar',
                    branches: 'Filiallar',
                    feedback: 'Fikr qoldirish',
                    about: 'Biz haqimizda',
                    schedule: 'Ish jadvali',
                    everyday: 'Har kuni',
                    total: 'Jami summa',
                    checkout: 'Buyurtma berish',
                    history: 'Buyurtmalarim',
                    no_orders: 'Sizda hali buyurtmalar yo\'q',
                    back: 'Orqaga',
                    reorder: 'Qayta buyurtma'
                },
                cyr: {
                    menu: 'Бош саҳифа',
                    orders: 'Буюртмалар',
                    cart: 'Сават',
                    profile: 'Профил',
                    contacts: 'Контактлар',
                    branches: 'Филиаллар',
                    feedback: 'Фикр қолдириш',
                    about: 'Биз ҳақимизда',
                    schedule: 'Иш жадвали',
                    everyday: 'Ҳар куни',
                    total: 'Жами сумма',
                    checkout: 'Буюртма бериш',
                    history: 'Буюртмаларим',
                    no_orders: 'Сизда ҳали буюртмалар йўқ',
                    back: 'Орқага',
                    reorder: 'Қайта буюртма'
                }
            }[lang];

            useEffect(() => {
                if (tg) {
                    const isDark = tg.colorScheme === 'dark';
                    setIsDarkMode(isDark);
                }
            }, [tg]);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const toggleDarkMode = () => setIsDarkMode(!isDarkMode);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const fetchProducts = () => {
                fetch('/api/products?t=' + Date.now())
                    .then(res => res.json())
                    .then(data => {
                        const formatted = data.map(p => ({ 
                            ...p, 
                            image: p.image_url || (p.image_file_id ? '/api/image/' + p.image_file_id : '') 
                        }));
                        setProducts(formatted);
                        setProductsLoaded(true);
                    });
            };

            const fetchPromo = () => {
                fetch('/api/promo?t=' + Date.now()).then(res => res.json()).then(setPromoImages);
            };

            const fetchNews = () => {
                fetch('/api/news?t=' + Date.now()).then(res => res.json()).then(setNews);
            };

            const fetchOrders = () => {
                if (!tg?.initDataUnsafe?.user?.id) return;
                fetch(`/api/orders/${tg.initDataUnsafe.user.id}?t=` + Date.now())
                    .then(res => res.json())
                    .then(setUserOrders);
            };

            const fetchStats = () => {
                fetch('/api/admin/stats?t=' + Date.now())
                    .then(res => res.json())
                    .then(setStats);
            };

            useEffect(() => {
                if (tg) {
                    const user = tg.initDataUnsafe?.user;
                    if (user && (String(user.id) === '1579550200' || user.username?.toLowerCase() === 'iambh7')) {
                        setIsAdmin(true);
                    }
                }
                fetchProducts();
                fetchPromo();
                fetchNews();
                if (tg) {
                    tg.ready();
                    tg.expand();
                }

                // Check for saved location - o'chirib qo'yildi (foydalanuvchi xohishiga ko'ra)
                // const savedLoc = localStorage.getItem('bekpay_location');
                // if (savedLoc) {
                //     setShowReconfirmModal(true);
                // } else {
                //     setShowLocationModal(true);
                // }
            }, [tg]);

            const reverseGeocode = async (lat, lon) => {
                if (!window.ymaps) return "Noma'lum manzil";
                try {
                    const res = await window.ymaps.geocode([lat, lon]);
                    const firstGeoObject = res.geoObjects.get(0);
                    return firstGeoObject ? firstGeoObject.getAddressLine() : "Noma'lum manzil";
                } catch (error) {
                    return "Noma'lum manzil";
                }
            };

            const handleSearchChange = async (val) => {
                setSearchQuery(val);
                if (val.length > 2 && window.ymaps) {
                    try {
                        const res = await window.ymaps.suggest(val);
                        setSuggestions(res);
                    } catch(e) {
                        console.error(e);
                    }
                } else {
                    setSuggestions([]);
                }
            };

            const selectSuggestion = async (suggestion) => {
                setSearchQuery(suggestion.displayName || suggestion.value);
                setSuggestions([]);
                if (window.ymaps && mapRef.current) {
                    try {
                        const res = await window.ymaps.geocode(suggestion.value);
                        const firstGeoObject = res.geoObjects.get(0);
                        if (firstGeoObject) {
                            const coords = firstGeoObject.geometry.getCoordinates();
                            mapRef.current.setCenter(coords, 16, { duration: 300 });
                        }
                    } catch(e) {}
                }
            };

            const centerToCurrentLocation = () => {
                if (navigator.geolocation && mapRef.current) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const coords = [pos.coords.latitude, pos.coords.longitude];
                        mapRef.current.setCenter(coords, 16, { duration: 300 });
                    }, () => {
                        showToast("Joylashuvni aniqlab bo'lmadi", "error");
                    });
                }
            };

            // Map Initialization
            useEffect(() => {
                const initMap = () => {
                    if (isMapVisible && !mapRef.current && window.ymaps) {
                        window.ymaps.ready(() => {
                            const defaultPos = location || GIJDUVAN_CENTER;
                            const map = new window.ymaps.Map('map-container', {
                                center: defaultPos,
                                zoom: 15,
                                controls: ['zoomControl']
                            });
                            
                            mapRef.current = map;

                            const updateLocation = async () => {
                                const center = map.getCenter();
                                setTempLocation(center);
                                
                                const inBounds = isWithinDeliveryArea(center[0], center[1]);
                                setOutOfBounds(!inBounds);

                                const addr = await reverseGeocode(center[0], center[1]);
                                setReverseAddr(addr);
                            };

                            map.events.add('boundschange', updateLocation);

                            // Initial call
                            updateLocation();
                        });
                    }
                };

                if (isMapVisible) {
                    if (window.ymaps) {
                        initMap();
                    } else {
                        const interval = setInterval(() => {
                            if (window.ymaps) {
                                clearInterval(interval);
                                initMap();
                            }
                        }, 100);
                        return () => clearInterval(interval);
                    }
                }
                
                return () => {
                    if (mapRef.current) {
                        mapRef.current.destroy();
                        mapRef.current = null;
                    }
                };
            }, [isMapVisible]);

            useEffect(() => {
                if (currentPage === 'orders') fetchOrders();
                if (currentPage === 'admin' && (adminTab === 'asosiy' || adminTab === 'statistika' || adminTab === 'moliya')) {
                    fetchStats();
                }
            }, [currentPage, adminTab]);

            useEffect(() => {
                if (currentPage === 'admin' && stats) {
                    if (typeof Chart === 'undefined') {
                        console.warn('Chart.js not loaded yet');
                        return;
                    }
                    
                    try {
                        if ((adminTab === 'asosiy' || adminTab === 'statistika') && lineChartRef.current) {
                            if (lineChartInstance.current) lineChartInstance.current.destroy();
                            const ctxLine = lineChartRef.current.getContext('2d');
                            lineChartInstance.current = new Chart(ctxLine, {
                                type: 'line',
                                data: {
                                    labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
                                    datasets: [{
                                        label: 'Savdo (so\'m)',
                                        data: stats.hourlyStats || [120000, 450000, 1200000, 850000, 500000, 950000, 1100000, 300000],
                                        borderColor: '#7C3AED',
                                        backgroundColor: 'rgba(124, 58, 237, 0.2)',
                                        fill: true,
                                        tension: 0.4
                                    }]
                                },
                                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, display: false }, x: { grid: { display: false } } } }
                            });
                        }

                        if (adminTab === 'statistika' && barChartRef.current) {
                            if (barChartInstance.current) barChartInstance.current.destroy();
                            const ctxBar = barChartRef.current.getContext('2d');
                            barChartInstance.current = new Chart(ctxBar, {
                                type: 'bar',
                                data: {
                                    labels: stats.topProducts?.length ? stats.topProducts.map(p => p.name) : ['-'],
                                    datasets: [{
                                        label: 'Sotilgan (dona)',
                                        data: stats.topProducts?.length ? stats.topProducts.map(p => p.count) : [0],
                                        backgroundColor: '#7C3AED',
                                        borderRadius: 4
                                    }]
                                },
                                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
                            });
                        }
                    } catch (err) {
                        console.error('Chart init error:', err);
                    }
                }
            }, [stats, adminTab, currentPage]);

            // Auto-rotate promo for non-admins
            useEffect(() => {
                if (isAdmin || promoImages.length <= 1 || promoPaused) return;
                promoTimerRef.current = setInterval(() => {
                    setPromoSlide(p => (p + 1) % promoImages.length);
                }, 3000);
                return () => clearInterval(promoTimerRef.current);
            }, [isAdmin, promoImages, promoPaused]);

            const handlePromoTouchStart = () => {
                if (isAdmin) return;
                clearInterval(promoTimerRef.current);
                clearTimeout(resumeTimerRef.current);
                setPromoPaused(true);
            };

            const handlePromoTouchEnd = () => {
                if (isAdmin) return;
                clearTimeout(resumeTimerRef.current);
                resumeTimerRef.current = setTimeout(() => setPromoPaused(false), 4000);
            };

            const addToCart = (id) => setCart(prev => ({ ...prev, [id]: (parseInt(prev[id]) || 0) + 1 }));
            const removeFromCart = (id) => setCart(prev => {
                const q = parseInt(prev[id]) || 0;
                if (q <= 1) { const n = {...prev}; delete n[id]; return n; }
                return { ...prev, [id]: q - 1 };
            });

            const handleProductAdd = (e) => {
                e.preventDefault();
                const form = e.target;
                const formData = new FormData(form);
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/admin/add-product', true);
                xhr.onload = function() {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        if (data.success) { showToast('✅ Qo\'shildi!'); fetchProducts(); form.reset(); }
                        else showToast('❌ ' + (data.message || 'Xatolik'), 'error');
                    } catch { showToast('❌ Xatolik', 'error'); }
                };
                xhr.send(formData);
            };

            const deleteProduct = (id) => {
                if (!confirm("O'chirilsinmi?")) return;
                fetch(`/api/admin/delete-product/${id}`, { method: 'DELETE' }).then(() => fetchProducts());
            };

            const handleNewsAdd = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                fetch('/api/admin/add-news', { method: 'POST', body: formData }).then(() => { showToast("Yuborildi!"); fetchNews(); e.target.reset(); });
            };

            const deleteNews = (id) => {
                if (!confirm("O'chirilsinmi?")) return;
                fetch(`/api/admin/delete-news/${id}`, { method: 'DELETE' }).then(() => fetchNews());
            };

            const handleLogoClick = () => {
                setLogoClicks(p => p + 1);
                if (logoClicks + 1 >= 5) {
                    const code = prompt("Admin parolini kiriting:");
                    if (code === '2026') { setIsAdmin(true); showToast("Admin rejimiga o'tildi!"); }
                    setLogoClicks(0);
                }
            };

            const handlePromoUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('photo', file);
                fetch('/api/upload-promo', { method: 'POST', body: formData }).then(() => fetchPromo());
            };

            const deletePromo = (index) => {
                if (!confirm("O'chirilsinmi?")) return;
                fetch(`/api/admin/delete-promo/${index}`, { method: 'DELETE' }).then(() => fetchPromo());
            };

            const categories = ["Osh", "Salatlar", "Qo'shimcha", "Ichimliklar"];
            const totalPrice = products.reduce((s, p) => s + (parseInt(cart[p.id]) || 0) * (parseInt(p.price) || 0), 0);
            const totalItems = Object.values(cart).reduce((s, q) => s + (parseInt(q) || 0), 0);

            const navItems = [
                {id:'home', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label: t.menu},
                {id:'cart', icon: 'M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z', label: t.cart},
                {id:'orders', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01', label: t.orders},
                {id:'profile', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label: t.profile}
            ];

            const activeIndex = navItems.findIndex(i => i.id === currentPage);

            if (!productsLoaded) return <div className="flex items-center justify-center h-screen bg-white dark:bg-darkBg text-primary font-black text-2xl animate-pulse">BEK PAY OSH</div>;

            const handleLocationConfirm = async () => {
                if (tempLocation) {
                    setLocation(tempLocation);
                    localStorage.setItem('bekpay_location', JSON.stringify(tempLocation));
                    
                    const addr = await reverseGeocode(tempLocation[0], tempLocation[1]);
                    setAddress(addr);
                    localStorage.setItem('bekpay_address', addr);
                    
                    setIsMapVisible(false);
                    setShowLocationModal(false);
                    setShowAddressDetailsForm(true);
                    showToast("📍 Joylashuv qabul qilindi!");
                }
            };

            const handleGetCurrentLocation = () => {
                if (navigator.geolocation) {
                    showToast("Joylashuv aniqlanmoqda...", "info");
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        
                        if (!isWithinDeliveryArea(lat, lon)) {
                            showToast("❌ Bu hududga yetkazib berish mavjud emas (Faqat G'ijduvon)", "error");
                            setIsMapVisible(true);
                            return;
                        }

                        const loc = [lat, lon];
                        setLocation(loc);
                        localStorage.setItem('bekpay_location', JSON.stringify(loc));
                        
                        const addr = await reverseGeocode(lat, lon);
                        setAddress(addr);
                        localStorage.setItem('bekpay_address', addr);
                        
                        showToast("📍 Joylashuv qabul qilindi!");
                        setTimeout(() => {
                            setShowLocationModal(false);
                            setShowAddressDetailsForm(true);
                        }, 1000);
                    }, (err) => {
                        console.error("Geolocation Error:", err);
                        let msg = "❌ Joylashuvni aniqlab bo'lmadi";
                        if (err.code === 1) {
                            msg = "❌ Ruxsat berilmadi. Telefoningiz sozlamalaridan Telegram va Brauzer uchun joylashuvga ruxsat bering.";
                        } else if (err.code === 2) {
                            msg = "❌ Joylashuv ma'lumotlari mavjud emas (GPS o'chiq bo'lishi mumkin).";
                        } else if (err.code === 3) {
                            msg = "❌ Kutish vaqti tugadi (Signal past). Qaytadan urinib ko'ring.";
                        }
                        showToast(msg, "error");
                    }, { 
                        enableHighAccuracy: false, 
                        timeout: 30000 
                    });
                } else {
                    showToast("❌ Brauzer joylashuvni qo'llab-quvvatlamaydi", "error");
                }
            };

            return (
                <div className="pb-32 font-sans text-gray-800 dark:text-gray-100 min-h-screen">
                    {/* Reconfirm Saved Address Modal */}
                    {showReconfirmModal && (
                        <div className="fixed inset-0 z-[110] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white dark:bg-darkCard w-full max-w-sm rounded-[32px] p-6 shadow-2xl text-center">
                                <div className="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🏠</div>

                                                <div className="w-8 h-8 bg-green-50 text-green-500 rounded-lg flex items-center justify-center mb-2">📥</div>
                                                <p className="text-[10px] text-gray-500 font-bold mb-1">Tushum</p>
                                                <p className="text-sm font-black">{stats.periods.today.revenue.toLocaleString()} <span className="text-[9px] text-gray-400 font-normal">so'm</span></p>
                                            </div>
                                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                                <div className="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center mb-2">📤</div>
                                                <p className="text-[10px] text-gray-500 font-bold mb-1">Xarajat</p>
                                                <p className="text-sm font-black">{(stats.periods.today.revenue * 0.4).toLocaleString()} <span className="text-[9px] text-gray-400 font-normal">so'm</span></p>
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex items-center justify-center">💰</div>
                                                    <p className="text-[10px] text-gray-500 font-bold">Sof foyda</p>
                                                </div>
                                            </div>
                                            <p className="text-lg font-black">{(stats.periods.today.revenue * 0.6).toLocaleString()} <span className="text-[10px] text-gray-400 font-normal">so'm</span></p>
                                        </div>
                                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                            <h3 className="text-sm font-bold mb-4">Kundalik hisobot</h3>
                                            <div className="space-y-3 text-xs">
                                                <div className="flex justify-between"><span className="text-gray-500 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-gray-300"></div>Mahsulotlar narxi</span><span className="font-bold">{(stats.periods.today.revenue * 0.2).toLocaleString()} so'm</span></div>
                                                <div className="flex justify-between"><span className="text-gray-500 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-gray-300"></div>Ishchilar maoshi</span><span className="font-bold">{(stats.periods.today.revenue * 0.1).toLocaleString()} so'm</span></div>
                                                <div className="flex justify-between"><span className="text-gray-500 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-gray-300"></div>Yetkazib berish xarajati</span><span className="font-bold">{(stats.periods.today.revenue * 0.05).toLocaleString()} so'm</span></div>
                                                <div className="flex justify-between pb-3 border-b border-gray-100"><span className="text-gray-500 flex items-center gap-2"><div className="w-1.5 h-1.5 rounded-full bg-gray-300"></div>Boshqa xarajatlar</span><span className="font-bold">{(stats.periods.today.revenue * 0.05).toLocaleString()} so'm</span></div>
                                                <div className="flex justify-between pt-1"><span className="font-bold">Sof foyda</span><span className="font-bold text-green-500">{(stats.periods.today.revenue * 0.6).toLocaleString()} so'm</span></div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {adminTab === 'statistika' && stats && (
                                    <div className="space-y-4 animate-[fadeIn_0.3s]">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                                <p className="text-[10px] text-gray-500 font-bold mb-1">Jami tushum</p>
                                                <p className="text-sm font-black">{stats.totalRevenue.toLocaleString()} <span className="text-[9px] text-gray-400 font-normal">so'm</span></p>
                                                <p className="text-[9px] text-green-500 font-bold mt-1 bg-green-50 inline-block px-1 rounded">↑ 12%</p>
                                            </div>
                                            <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                                <p className="text-[10px] text-gray-500 font-bold mb-1">Buyurtmalar</p>
                                                <p className="text-sm font-black">{stats.totalOrders} <span className="text-[9px] text-gray-400 font-normal">ta</span></p>
                                                <p className="text-[9px] text-green-500 font-bold mt-1 bg-green-50 inline-block px-1 rounded">↑ 9%</p>
                                            </div>
                                        </div>
                                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                                            <h3 className="text-sm font-bold mb-4">Savdo grafigi</h3>
                                            <canvas ref={barChartRef} height="200"></canvas>
                                        </div>
                                    </div>
                                )}
                                
                                {adminTab === 'mijozlar' && (
                                    <div className="space-y-4 animate-[fadeIn_0.3s]">
                                        <div className="relative">
                                            <input type="text" placeholder="Mijoz qidirish..." className="w-full bg-white px-10 py-3 rounded-xl border border-gray-100 text-sm outline-none shadow-sm" />
                                            <span className="absolute left-3 top-3.5 text-gray-400">🔍</span>
                                        </div>
                                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                            <div className="p-4 space-y-4">
                                                {[1,2,3].map(i => (
                                                    <div key={i} className="flex items-center justify-between pb-4 border-b border-gray-50 last:border-0 last:pb-0">
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-lg">👤</div>
                                                            <div>
                                                                <p className="text-sm font-bold">Mijoz #{i}</p>
                                                                <p className="text-[10px] text-gray-400">+998 90 123 45 6{i}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-[9px] text-gray-400 mb-0.5">Buyurtmalar</p>
                                                            <p className="text-sm font-bold">{i*5} ta</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            {/* Add Product Modal (Triggered by bottom nav Plus button) */}
                            {showAddMenu && (
                                <div className="fixed inset-0 bg-black/50 z-50 flex flex-col justify-end">
                                    <div className="bg-white rounded-t-3xl p-6 animate-[fadeIn_0.2s]">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-lg font-black">Yangi mahsulot</h2>
                                            <button onClick={() => setShowAddMenu(false)} className="bg-gray-100 p-2 rounded-full font-bold">✕</button>
                                        </div>
                                        <form onSubmit={(e) => { handleProductAdd(e); setShowAddMenu(false); }} className="space-y-4">
                                            <input name="name" placeholder="Taom nomi" className="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 font-bold" required />
                                            <input name="price" type="number" placeholder="Narxi" className="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 font-bold" required />
                                            <select name="category" className="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 font-bold" required>
                                                <option value="">Kategoriya</option>
                                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <input type="file" name="photo" accept="image/*" className="text-xs w-full bg-gray-50 p-3 rounded-xl border border-gray-100 font-bold" required />
                                            <button type="submit" className="w-full bg-[#7C3AED] text-white py-4 rounded-xl font-black text-sm shadow-lg mt-2">Qo'shish</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* Admin Bottom Nav */}
                            <div className={`fixed bottom-0 left-0 right-0 h-20 ${adminTab === 'asosiy' ? 'bg-[#12121A] border-white/5' : 'bg-white border-gray-100'} border-t flex justify-around items-center px-2 z-40 transition-colors`}>
                                {[
                                    { id: 'asosiy', icon: 'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6', label: 'Asosiy' },
                                    { id: 'buyurtmalar', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01', label: 'Buyurtmalar' },
                                    { id: 'add', isButton: true },
                                    { id: 'statistika', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z', label: 'Statistika' },
                                    { id: 'mahsulotlar', icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z', label: 'Profil' }
                                ].map(item => {
                                    if (item.isButton) {
                                        return (
                                            <div key="add" className="relative -top-5">
                                                <button onClick={() => setShowAddMenu(true)} className="w-14 h-14 bg-[#7C3AED] rounded-full flex items-center justify-center shadow-[0_8px_16px_rgba(124,58,237,0.4)] text-white active:scale-95 transition-transform">
                                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4" /></svg>
                                                </button>
                                            </div>
                                        );
                                    }
                                    const isActive = adminTab === item.id || (item.id === 'mahsulotlar' && (adminTab === 'mahsulotlar' || adminTab === 'mijozlar' || adminTab === 'moliya'));
                                    const colorClass = adminTab === 'asosiy' ? (isActive ? 'text-[#7C3AED]' : 'text-gray-500') : (isActive ? 'text-[#7C3AED]' : 'text-gray-400');
                                    return (
                                        <button key={item.id} onClick={() => setAdminTab(item.id)} className={`flex flex-col items-center gap-1 ${colorClass}`}>
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={item.icon} /></svg>
                                            <span className="text-[9px] font-bold">{item.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Bottom Nav */}
                    {currentPage !== 'admin' && (
                        <div className="fixed bottom-0 left-0 right-0 h-20 bg-white dark:bg-darkCard border-t border-gray-50 dark:border-white/5 flex items-center justify-around z-50">
                            {/* Moving Background Circle */}
                            <div className="nav-active-bg" style={{ left: `calc(${activeIndex * 25}% + 12.5% - 32px)` }}></div>
                            
                            {navItems.map((item, i) => (
                                <div 
                                    key={item.id} 
                                    onClick={() => { setCurrentPage(item.id); setProfileDetail(null); }} 
                                    className={`nav-item flex-1 flex flex-col items-center justify-center gap-1 ${currentPage === item.id ? 'active' : 'text-gray-300'}`}
                                >
                                    <span className="text-2xl transition-all">
                                        <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d={item.icon} />
                                        </svg>
                                    </span>
                                    <span className={`text-[10px] font-black uppercase tracking-tighter transition-all ${currentPage === item.id ? 'opacity-100 mt-2' : 'opacity-0 h-0'}`}>
                                        {item.label}
                                    </span>
                                    {item.id === 'cart' && totalItems > 0 && (
                                        <span className={`absolute top-0 right-1/4 bg-accent text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-black border border-white ${currentPage === 'cart' ? 'hidden' : ''}`}>
                                            {totalItems}
                                        </span>
                                    )}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
